name: Smoke Channels

# Смок-матрица каналов мессенджера: по каждому треду из allowlist (smoke_test_threads)
# прогоняет комбинации исходящих (текст/reply/файл/файл+текст/альбом/реакция/edit/delete)
# и проверяет доставку (send_status='sent').
#
# ⚠️ Отправляет РЕАЛЬНЫЕ сообщения в тест-чаты. Частые прогоны могут влиять на
# блокировку каналов (WhatsApp/WAHA), поэтому автозапуск ОТКЛЮЧЁН.
# Запуск ТОЛЬКО вручную (workflow_dispatch) — лично владельцем по необходимости.
#
# Секреты: SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#          NEXT_PUBLIC_SUPABASE_URL, SMOKE_BOT_PASSWORD.
#          R2_* + STORAGE_R2_BUCKETS — чтобы тест-файлы писались в R2 (куда читает
#          приложение); без них файловый тест ушёл бы в Supabase → ложный сбой.

on:
  # Только ручной запуск — никакого расписания (см. коммент выше).
  workflow_dispatch: {}

concurrency:
  group: smoke-channels
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install @supabase/supabase-js
        run: npm install --no-save @supabase/supabase-js@2
      - name: Run smoke matrix
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SMOKE_BOT_EMAIL: smoke-bot@clientcase.internal
          SMOKE_BOT_PASSWORD: ${{ secrets.SMOKE_BOT_PASSWORD }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          STORAGE_R2_BUCKETS: ${{ secrets.STORAGE_R2_BUCKETS }}
        run: node scripts/smoke-matrix.mjs --confirm
