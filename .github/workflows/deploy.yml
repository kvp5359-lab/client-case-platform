name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # 1. Quality gate — lint + tests
  # ===========================================
  # Шаг защиты от поломок: если линтер или тесты упали,
  # build и deploy не запускаются. Защищает прод от попадания
  # коммитов с ошибками типов, нарушением правил безопасности
  # (фильтры is_deleted/workspace_id) и регрессов в правах.
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ===========================================
  # 2. Build Docker Image
  # ===========================================
  build:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS=${{ secrets.NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS }}
            NEXT_PUBLIC_APP_VERSION=1.0.0
            NEXT_PUBLIC_MODULE_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_MODULE_SUPABASE_URL }}
            NEXT_PUBLIC_MODULE_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_MODULE_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STORAGE_R2_BUCKETS=files,document-files,document-templates,message-attachments,participant-avatars
            NEXT_PUBLIC_R2_PUBLIC_BASE=participant-avatars=https://cdn.clientcase.app

  # ===========================================
  # 3. Deploy to VPS
  # ===========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Деплой обёрнут в retry: SSH Actions->VPS периодически даёт сетевой
      # i/o timeout (пакеты теряются по пути на ~5 мин, VPS при этом исправен —
      # ufw/fail2ban выключены, sshd:22 слушает). Логика в scripts/deploy-vps.sh
      # идемпотентна — повтор безопасен. Ретраи растянуты так, чтобы пережить
      # окно провала: 6 попыток × (ConnectTimeout 30с + пауза 45с) ≈ 7.5 мин.
      # ServerAliveInterval держит уже установленную сессию (deploy-скрипт ~2 мин).
      - name: Deploy to VPS via SSH (retry on transient network timeout)
        uses: nick-fields/retry@v3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        with:
          timeout_minutes: 20
          max_attempts: 6
          retry_wait_seconds: 45
          command: >-
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4
            "$VPS_USER@$VPS_HOST"
            "GH_PAT='$GH_PAT' REGISTRY='$REGISTRY' IMAGE_NAME='$IMAGE_NAME' bash -s"
            < scripts/deploy-vps.sh

      - name: Deployment successful
        run: echo "ClientCase deployment successful!"

  # ===========================================
  # 4. Auto-deploy backend (scripts / edge / mtproto) — что изменилось в push
  # ===========================================
  # deploy.yml раньше катил ТОЛЬКО фронт; edge/mtproto/скрипты были ручными.
  # Этот job автоматизирует их: определяет по git-diff, что реально изменилось,
  # и деплоит ТОЛЬКО это, затем прогоняет смок каналов (предохранитель карантина).
  #
  # Идёт параллельно фронту (оба нужны quality). Падение backend НЕ блокирует
  # фронт (фронт обратно-совместим со старым edge в окне переключения).
  #
  # Гейт по секретам: scripts + mtproto работают на текущих (VPS_*); edge требует
  # SUPABASE_ACCESS_TOKEN, смок-файлы R2 — R2_*; при отсутствии секрета шаг
  # аккуратно пропускается с ::warning:: (ничего не ломает).
  #
  # Миграции БД авто НЕ применяются (необратимо, требует ревью) — только warning.
  backend:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # полная история: github.event.before резолвится даже
          # для многокоммитного пуша → git-diff видит ВЕСЬ диапазон пуша, а не
          # только HEAD~1 (иначе изменения в ранних коммитах пуша, напр. mtproto,
          # пропускались и авто-деплой их не подхватывал — инцидент 2026-07-12).

      - name: Detect changed backend paths
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || \
             ! git rev-parse --quiet --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
            BEFORE="${{ github.sha }}~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" || true)
          echo "Изменённые файлы:"; echo "$CHANGED"

          # --- edge: функции, чей каталог изменился (без _shared/types) ---
          EDGE=$(echo "$CHANGED" | grep '^supabase/functions/' \
                 | grep -vE '^supabase/functions/(_shared|types)/' \
                 | sed -E 's#^supabase/functions/([^/]+)/.*#\1#' | sort -u || true)
          # --- _shared изменился → добавить все функции, что его импортируют ---
          SHARED=$(echo "$CHANGED" | grep '^supabase/functions/_shared/' | sed -E 's#.*/_shared/##' || true)
          for f in $SHARED; do
            deps=$(grep -rl "_shared/$f" supabase/functions --include=*.ts 2>/dev/null \
                   | grep -v '/_shared/' | sed -E 's#supabase/functions/([^/]+)/.*#\1#' | sort -u || true)
            EDGE=$(printf '%s\n%s\n' "$EDGE" "$deps" | sort -u)
          done
          EDGE=$(echo "$EDGE" | grep -v '^$' | tr '\n' ' ' | sed 's/ *$//')
          echo "edge=$EDGE" >> "$GITHUB_OUTPUT"
          echo "Edge к деплою: [$EDGE]"

          MTPROTO=false; echo "$CHANGED" | grep -q '^mtproto-service/' && MTPROTO=true
          echo "mtproto=$MTPROTO" >> "$GITHUB_OUTPUT"

          MIGRATIONS=false; echo "$CHANGED" | grep -q '^supabase/migrations/' && MIGRATIONS=true
          echo "migrations=$MIGRATIONS" >> "$GITHUB_OUTPUT"

      - name: Check available secrets
        id: sec
        env:
          SB_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          R2_EP: ${{ secrets.R2_ENDPOINT }}
        run: |
          [ -n "$SB_TOKEN" ] && echo "has_sb_token=true" >> "$GITHUB_OUTPUT" || echo "has_sb_token=false" >> "$GITHUB_OUTPUT"
          [ -n "$R2_EP" ] && echo "has_r2=true" >> "$GITHUB_OUTPUT" || echo "has_r2=false" >> "$GITHUB_OUTPUT"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # --- Скрипты: всегда синхронизируем на VPS (закрывает ночной бэкап из R2) ---
      # БЕЗ --delete: в /opt/clientcase/scripts/ есть VPS-only обёртки (напр.
      # backup-storage.sh, вне git) — их удалять нельзя. Оверлеем поверх.
      - name: Sync scripts to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az \
            -e "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30" \
            ./scripts/ "$VPS_USER@$VPS_HOST:/opt/clientcase/scripts/"
          echo "::notice::scripts/ синхронизированы на VPS (бэкап читает из R2)"

      # --- mtproto: rsync + пересборка, только если менялся ---
      - name: Deploy mtproto-service
        if: ${{ steps.changes.outputs.mtproto == 'true' }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude dist --exclude .env \
            -e "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30" \
            ./mtproto-service/ "$VPS_USER@$VPS_HOST:/opt/clientcase/mtproto-service/"
          ssh -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" \
            "cd /opt/clientcase && docker compose build mtproto && docker compose up -d mtproto"
          echo "::notice::mtproto-service передеплоен"

      # --- edge: только изменённые функции; нужен SUPABASE_ACCESS_TOKEN ---
      - name: Setup Supabase CLI
        if: ${{ steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token == 'true' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy changed Edge Functions
        if: ${{ steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          chmod +x scripts/deploy-edge.sh
          echo "Деплой edge: ${{ steps.changes.outputs.edge }}"
          scripts/deploy-edge.sh ${{ steps.changes.outputs.edge }}
      - name: Edge skipped (нет токена)
        if: ${{ steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token != 'true' }}
        run: echo "::warning::Изменены edge-функции (${{ steps.changes.outputs.edge }}), но SUPABASE_ACCESS_TOKEN не задан — авто-деплой edge пропущен. Добавь секрет (supabase.com → Account → Access Tokens) или задеплой вручную через 'Deploy Backend'."

      # --- Смок каналов: если задеплоены edge/mtproto (предохранитель карантина) ---
      - name: Setup Node for smoke
        if: ${{ (steps.changes.outputs.mtproto == 'true' || (steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token == 'true')) }}
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps for smoke
        if: ${{ (steps.changes.outputs.mtproto == 'true' || (steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token == 'true')) }}
        run: npm ci --legacy-peer-deps
      - name: Smoke channels
        if: ${{ (steps.changes.outputs.mtproto == 'true' || (steps.changes.outputs.edge != '' && steps.sec.outputs.has_sb_token == 'true')) }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SMOKE_BOT_PASSWORD: ${{ secrets.SMOKE_BOT_PASSWORD }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          STORAGE_R2_BUCKETS: ${{ secrets.STORAGE_R2_BUCKETS }}
        run: |
          echo "Смок каналов после деплоя (allowlist smoke_test_threads)…"
          node scripts/smoke-matrix.mjs --confirm

      # --- Миграции: авто НЕ применяем, только предупреждаем ---
      - name: Migrations warning
        if: ${{ steps.changes.outputs.migrations == 'true' }}
        run: echo "::warning::Изменены миграции БД — авто НЕ применяются. Примени вручную через 'Deploy Backend' (migrations) ПЕРЕД тем как код на них полагается."
