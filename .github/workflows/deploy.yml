name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # 1. Build Docker Image
  # ===========================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS=${{ secrets.NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS }}
            NEXT_PUBLIC_APP_VERSION=1.0.0

  # ===========================================
  # 2. Deploy to VPS
  # ===========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/clientcase

            # Авторизация в GitHub Container Registry
            echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u kvp5359-lab --password-stdin

            # Загружаем новый образ
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Перезапускаем контейнер
            docker compose up -d --force-recreate app

            # Перезагружаем nginx (в контейнере relostart)
            cd /opt/relostart
            docker compose exec -T nginx nginx -s reload

            # Очищаем старые образы
            docker image prune -f

            # Проверяем статус
            sleep 10
            docker compose -f /opt/clientcase/docker-compose.yml ps
            curl -f http://localhost:3002/ || exit 1

      - name: Deployment successful
        run: echo "✅ ClientCase deployment successful!"
