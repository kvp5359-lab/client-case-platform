name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # 1. Quality gate — lint + tests
  # ===========================================
  # Шаг защиты от поломок: если линтер или тесты упали,
  # build и deploy не запускаются. Защищает прод от попадания
  # коммитов с ошибками типов, нарушением правил безопасности
  # (фильтры is_deleted/workspace_id) и регрессов в правах.
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ===========================================
  # 2. Build Docker Image
  # ===========================================
  build:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS=${{ secrets.NEXT_PUBLIC_TECHNICAL_ADMIN_EMAILS }}
            NEXT_PUBLIC_APP_VERSION=1.0.0
            NEXT_PUBLIC_MODULE_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_MODULE_SUPABASE_URL }}
            NEXT_PUBLIC_MODULE_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_MODULE_SUPABASE_ANON_KEY }}

  # ===========================================
  # 3. Deploy to VPS
  # ===========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Деплой обёрнут в retry: SSH Actions->VPS периодически даёт сетевой
      # i/o timeout (пакеты теряются по пути, VPS при этом исправен). Логика
      # в scripts/deploy-vps.sh идемпотентна — повтор безопасен.
      - name: Deploy to VPS via SSH (retry on transient network timeout)
        uses: nick-fields/retry@v3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        with:
          timeout_minutes: 12
          max_attempts: 3
          retry_wait_seconds: 20
          command: >-
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60
            "$VPS_USER@$VPS_HOST"
            "GH_PAT='$GH_PAT' REGISTRY='$REGISTRY' IMAGE_NAME='$IMAGE_NAME' bash -s"
            < scripts/deploy-vps.sh

      - name: Deployment successful
        run: echo "ClientCase deployment successful!"
