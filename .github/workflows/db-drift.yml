name: Ops Checks

# Проверки устойчивости:
#  - дрейф функций/триггеров/RLS repo↔prod (сверка с supabase/schema/schema-manifest.json).
#    На PR к миграциям/схеме — БЛОКИРУЕТ (--strict). По расписанию/dispatch — только сигнал.
#  - здоровье каналов мессенджера (застрявшие отправки, сбои, Gmail watch) — сигнал.
# Требует секрет SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets → Actions).
# URL берётся из уже существующего NEXT_PUBLIC_SUPABASE_URL.

on:
  schedule:
    - cron: '0 5 * * *'   # ежедневно 05:00 UTC
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schema/**'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps
      - name: Проверка дрейфа функций
        run: node scripts/db-drift-check.mjs ${{ github.event_name == 'pull_request' && '--strict' || '' }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Инварианты хрупких мест БД — валит всегда при нарушении (блокирует PR, «краснит» daily):
      # правила формулы непрочитанного + совпадение колонок get_workspace_threads↔board_filtered.
      - name: Инварианты БД
        run: node scripts/check-db-invariants.mjs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Поведенческий self-test счётчиков непрочитанного (recompute_thread_unread_for):
      # 4 сценария на fixture с самооткатом. Валит, если формула сломана.
      - name: Self-test счётчиков непрочитанного
        run: node scripts/check-recompute-selftest.mjs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Инварианты edge-отправки — валит, если любая send/edit-функция потеряла
      # visibility-backstop (защита от утечки внутреннего сообщения клиенту,
      # инцидент 2026-07-08). Статический, без БД/сети.
      - name: Инварианты edge-отправки
        run: node scripts/check-edge-invariants.mjs
      - name: Здоровье каналов мессенджера
        run: node scripts/channel-health.mjs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
