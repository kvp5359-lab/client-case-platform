# -------------------------------------------
# HTTP → HTTPS редирект для обоих доменов
# -------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name app.relostart.com clientcase.kvp-projects.com;

    # Для certbot (обновление SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
