# ===========================================
# ClientCase — два домена на один Next.js (порт 3002)
# app.relostart.com
# clientcase.kvp-projects.com
# ===========================================

upstream clientcase {
    server 127.0.0.1:3002;
    keepalive 64;
}

# Общий шаблон SSL-настроек вынесен в переменные через include,
# но для простоты дублируем в двух server-блоках.

# -------------------------------------------
# app.relostart.com
# -------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name app.relostart.com;

    ssl_certificate /etc/letsencrypt/live/app.relostart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.relostart.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Static files — кэш на год
    location /_next/static/ {
        proxy_pass http://clientcase;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Все остальные запросы
    location / {
        proxy_pass http://clientcase;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# -------------------------------------------
# clientcase.kvp-projects.com
# -------------------------------------------
